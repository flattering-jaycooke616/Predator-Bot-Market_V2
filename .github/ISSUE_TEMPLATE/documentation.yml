name: Documentation
description: Suggest improvements or report issues with documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the documentation issue or improvement.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested changes
      description: What would you like to see changed or added?
