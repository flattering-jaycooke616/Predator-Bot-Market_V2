services:
  - type: web
    name: predator-bot-market-api
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: artifacts/api-server/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: predator-db
          property: connectionString
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

databases:
  - name: predator-db
    databaseName: predator_bots
    plan: free
