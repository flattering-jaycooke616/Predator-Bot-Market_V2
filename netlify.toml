[build]
  base = "."
  command = "pnpm install && cd artifacts/predator-bots && pnpm run build"
  publish = "artifacts/predator-bots/dist/public"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.33.2"

# SPA fallback for all routes (Clerk auth routes, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.dev https://*.clerk.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.clerk.dev https://*.clerk.com; frame-src 'self' https://*.clerk.dev https://*.clerk.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
