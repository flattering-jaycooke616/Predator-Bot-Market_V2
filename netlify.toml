[build]
  base = "."
  command = "pnpm install && cd artifacts/predator-bots && pnpm run build"
  publish = "artifacts/predator-bots/dist/public"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.33.2"

# SPA fallback for all routes (Clerk auth routes, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
