[build]
  base = "."
  command = "pnpm install && cd artifacts/predator-bots && pnpm run build"
  publish = "artifacts/predator-bots/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.33.2"

[functions]
  node_bundler = "esbuild"
  included_files = ["artifacts/api-server/src/**/*", "lib/**/*"]

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
